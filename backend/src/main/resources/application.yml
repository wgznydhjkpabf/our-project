server:
  port: 8080

spring:
  application:
    name: campus-trade
  datasource:
    url: jdbc:mysql://localhost:3306/campus_trade?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.trade.entity
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: campus-trade-jwt-secret-key-2025-software-engineering-course
    expiration-ms: 86400000
  upload:
    dir: uploads

websocket:
  allowed-origins: "*"
